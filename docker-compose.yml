services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: bazar
      POSTGRES_PASSWORD: bazar
      POSTGRES_DB: bazar_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    ports:
    - "6379:6379"
    volumes:
    - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: bazar
      POSTGRES_PASSWORD: bazar
      POSTGRES_DB: bazar_market
      REDIS_URL: redis://:redis_password@redis:6379
      REDIS_DATABASE: "0"
      SESSION_SECRET: super-secret-change-me
      SESSION_TTL: "86400"
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redis_data:
