services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: bazar
      POSTGRES_PASSWORD: bazar
      POSTGRES_DB: bazar_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: bazar
      POSTGRES_PASSWORD: bazar
      POSTGRES_DB: bazar_market
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
